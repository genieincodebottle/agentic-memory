<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="700" height="320" rx="16" fill="url(#bg3)"/>

  <text x="350" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Typed Decay</text>
  <text x="350" y="56" text-anchor="middle" fill="#64748b" font-size="12">A peanut allergy should not decay like a favorite color</text>

  <!-- Time axis -->
  <line x1="170" y1="260" x2="650" y2="260" stroke="#334155" stroke-width="1"/>
  <text x="170" y="278" fill="#64748b" font-size="10" text-anchor="middle">0</text>
  <text x="290" y="278" fill="#64748b" font-size="10" text-anchor="middle">7d</text>
  <text x="370" y="278" fill="#64748b" font-size="10" text-anchor="middle">14d</text>
  <text x="450" y="278" fill="#64748b" font-size="10" text-anchor="middle">30d</text>
  <text x="570" y="278" fill="#64748b" font-size="10" text-anchor="middle">90d</text>
  <text x="650" y="278" fill="#64748b" font-size="10" text-anchor="middle">time</text>

  <!-- Tick marks -->
  <line x1="290" y1="257" x2="290" y2="263" stroke="#475569" stroke-width="1"/>
  <line x1="370" y1="257" x2="370" y2="263" stroke="#475569" stroke-width="1"/>
  <line x1="450" y1="257" x2="450" y2="263" stroke="#475569" stroke-width="1"/>
  <line x1="570" y1="257" x2="570" y2="263" stroke="#475569" stroke-width="1"/>

  <!-- constraint - flat line (never decays) -->
  <text x="40" y="98" fill="#f87171" font-size="13" font-weight="600">constraint</text>
  <text x="130" y="98" fill="#64748b" font-size="10">never</text>
  <line x1="170" y1="94" x2="650" y2="94" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>

  <!-- fact - slow exponential -->
  <text x="40" y="138" fill="#60a5fa" font-size="13" font-weight="600">fact</text>
  <text x="130" y="138" fill="#64748b" font-size="10">90d</text>
  <path d="M170,134 Q350,136 450,152 Q550,172 650,210" stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- preference - medium exponential -->
  <text x="40" y="168" fill="#a78bfa" font-size="13" font-weight="600">preference</text>
  <text x="130" y="168" fill="#64748b" font-size="10">30d</text>
  <path d="M170,164 Q300,172 370,196 Q450,228 550,250 L650,255" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- episodic - faster exponential -->
  <text x="40" y="198" fill="#fbbf24" font-size="13" font-weight="600">episodic</text>
  <text x="130" y="198" fill="#64748b" font-size="10">14d</text>
  <path d="M170,194 Q260,210 330,236 Q400,252 450,256 L650,258" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- task - step function (drops at 7 days) -->
  <text x="40" y="228" fill="#4ade80" font-size="13" font-weight="600">task</text>
  <text x="130" y="228" fill="#64748b" font-size="10">7d</text>
  <line x1="170" y1="224" x2="287" y2="224" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="290" y1="224" x2="290" y2="258" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="258" x2="650" y2="258" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Legend -->
  <rect x="430" y="76" width="220" height="32" rx="6" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="445" y="96" fill="#fbbf24" font-size="11" font-weight="700">importance: 'hard'</text>
  <text x="580" y="96" fill="#94a3b8" font-size="11">= never decays</text>

  <!-- Y axis label -->
  <text x="160" y="80" fill="#64748b" font-size="10" text-anchor="end">confidence</text>
  <text x="160" y="260" fill="#64748b" font-size="10" text-anchor="end">0</text>
  <line x1="168" y1="84" x2="168" y2="260" stroke="#334155" stroke-width="0.5"/>
</svg>
