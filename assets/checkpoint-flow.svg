<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="sh2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="700" height="340" rx="16" fill="url(#bg4)"/>

  <text x="350" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Checkpointing - Survive Context Overflow</text>

  <!-- Step boxes -->
  <rect x="30" y="60" width="180" height="50" rx="8" fill="#1a3a2a" stroke="#4ade80" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="120" y="82" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">STEP 1</text>
  <text x="120" y="99" text-anchor="middle" fill="#e2e8f0" font-size="13">Fetch data</text>
  <text x="195" y="75" fill="#4ade80" font-size="14">&#10003;</text>

  <rect x="260" y="60" width="180" height="50" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="350" y="82" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">STEP 2</text>
  <text x="350" y="99" text-anchor="middle" fill="#e2e8f0" font-size="13">Process records</text>
  <text x="422" y="78" fill="#fbbf24" font-size="12">&#9203;</text>

  <rect x="490" y="60" width="180" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#sh2)"/>
  <text x="580" y="82" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">STEP 3</text>
  <text x="580" y="99" text-anchor="middle" fill="#94a3b8" font-size="13">Generate report</text>

  <!-- Arrows between steps -->
  <path d="M210,85 L255,85" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M440,85 L485,85" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4ade80"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f87171"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#60a5fa"/>
    </marker>
  </defs>

  <!-- Context full warning -->
  <rect x="455" y="118" width="130" height="24" rx="12" fill="#7f1d1d" stroke="#f87171" stroke-width="1"/>
  <text x="520" y="134" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">context full!</text>

  <!-- Arrow down from step 2 -->
  <path d="M350,110 L350,155" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- checkpoint() box -->
  <rect x="250" y="160" width="200" height="44" rx="8" fill="#1a3a2a" stroke="#4ade80" stroke-width="2" filter="url(#sh2)"/>
  <text x="350" y="187" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">checkpoint()</text>

  <!-- Arrow down to state -->
  <path d="M350,204 L350,225" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Saved state items -->
  <rect x="120" y="228" width="460" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="155" y="251" fill="#94a3b8" font-size="12">Saves:</text>
  <rect x="200" y="237" width="80" height="20" rx="10" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
  <text x="240" y="251" text-anchor="middle" fill="#e2e8f0" font-size="10">task graph</text>
  <rect x="290" y="237" width="72" height="20" rx="10" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
  <text x="326" y="251" text-anchor="middle" fill="#e2e8f0" font-size="10">summary</text>
  <rect x="372" y="237" width="90" height="20" rx="10" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
  <text x="417" y="251" text-anchor="middle" fill="#e2e8f0" font-size="10">tool outputs</text>
  <rect x="472" y="237" width="90" height="20" rx="10" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
  <text x="517" y="251" text-anchor="middle" fill="#e2e8f0" font-size="10">memories</text>

  <!-- Context resets -->
  <line x1="100" y1="280" x2="600" y2="280" stroke="#f87171" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="350" y="294" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600" opacity="0.8">~~ context resets ~~</text>

  <!-- rehydrate() box -->
  <rect x="250" y="302" width="200" height="30" rx="8" fill="#1a3a2a" stroke="#4ade80" stroke-width="2" filter="url(#sh2)"/>
  <text x="350" y="322" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700">rehydrate() &#8594; resume step 2</text>
</svg>
